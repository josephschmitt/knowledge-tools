version: 2

# The CLI is a subdirectory module of the knowledge-tools monorepo. Skill releases use a
# skills/vX.Y.Z prefix (.github/workflows/package-skills.yml), so the CLI releases under its own
# cli/vX.Y.Z prefix — both namespaces are prefixed, which keeps skill version computation
# (git tag -l 'skills/v*') from ever seeing CLI tags and vice versa.
#
# goreleaser's `monorepo` (prefix-aware) feature is Pro-only, and OSS goreleaser parses the *raw*
# tag as semver before any template runs — so it cannot release directly from a "cli/vX.Y.Z" tag
# (it fails with "invalid semantic version"). Instead the release workflow builds artifacts in
# **snapshot** mode with the clean version injected via $CLI_VERSION (snapshot mode parses no tag
# and uploads nothing), then publishes the GitHub release itself on the real cli/vX.Y.Z tag with
# `gh`. Every name/version template below therefore uses {{ .Env.CLI_VERSION }} (e.g. 0.1.0), never
# {{ .Tag }}.

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: knowledge-tools
    main: ./cmd/knowledge-tools
    binary: knowledge-tools
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      # Clean version in the binary, injected by the workflow (e.g. 0.1.0).
      - -X main.version={{ .Env.CLI_VERSION }}

# Snapshot mode lets us build real artifacts without a parseable git tag (OSS goreleaser can't
# parse the cli/ prefix). The workflow runs `release --snapshot` and publishes via gh.
snapshot:
  version_template: "{{ .Env.CLI_VERSION }}"

archives:
  - id: knowledge-tools
    name_template: "{{ .ProjectName }}_{{ .Env.CLI_VERSION }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^build\(deps\):'
      - Merge pull request
      - Merge branch

# Homebrew cask is deferred until two things are in place:
#   1. the HOMEBREW_TAP_GITHUB_TOKEN repo secret is set (write to josephschmitt/homebrew-tap), and
#   2. a url.template override, because goreleaser is run in snapshot mode (no publish) so it won't
#      push the cask anyway — and its default download URL (releases/download/#{version}/...) would
#      point at a clean vX.Y.Z tag, not the real cli/vX.Y.Z release the workflow publishes.
# To re-enable: set the token, give the cask a url.template of
#   https://github.com/josephschmitt/knowledge-tools/releases/download/cli/v{{.Version}}/{{.ArtifactName}}
# and have the workflow drop --snapshot for a real publish (or push the cask in a separate step).
# homebrew_casks:
#   - name: knowledge-tools
#     repository:
#       owner: josephschmitt
#       name: homebrew-tap
#       token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     homepage: https://github.com/josephschmitt/knowledge-tools
#     description: "Host-side CLI for the personal LLM-wiki vault (compile/synthesize/resolve + daemon)"
#     hooks:
#       post:
#         install: |
#           system_command "/bin/ln", args: ["-sf", "#{staged_path}/knowledge-tools", "#{HOMEBREW_PREFIX}/bin/kt"]
#           system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/knowledge-tools"]

nfpms:
  - id: knowledge-tools
    package_name: knowledge-tools
    file_name_template: "{{ .ProjectName }}_{{ .Env.CLI_VERSION }}_{{ .Os }}_{{ .Arch }}"
    vendor: Joseph Schmitt
    homepage: https://github.com/josephschmitt/knowledge-tools
    maintainer: Joseph Schmitt <ai@joe.sh>
    description: Host-side CLI for the personal LLM-wiki vault
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    contents:
      # Short alias for daily use.
      - src: /usr/bin/knowledge-tools
        dst: /usr/bin/kt
        type: symlink

# Snapshot mode skips goreleaser's own GitHub release — the workflow publishes the release on the
# real cli/vX.Y.Z tag with `gh` (see cli-release.yml). Kept here for config completeness and in case
# the cask is ever re-enabled with a real (non-snapshot) publish; `disable: true` guards against a
# stray `goreleaser release` trying to publish on the unparseable cli/ tag.
release:
  github:
    owner: josephschmitt
    name: knowledge-tools
  disable: "true"
