version: 2

# The CLI is a subdirectory module of the knowledge-tools monorepo. Skill releases use a
# skills/vX.Y.Z prefix (.github/workflows/package-skills.yml), so the CLI releases under its own
# cli/vX.Y.Z prefix — both namespaces are prefixed, which keeps skill version computation
# (git tag -l 'skills/v*') from ever seeing CLI tags and vice versa.
#
# goreleaser's `monorepo` (prefix-aware) feature is Pro-only, and OSS goreleaser parses the *raw*
# tag as semver before any template runs — so it cannot release directly from a "cli/vX.Y.Z" tag
# (it fails with "invalid semantic version"). Instead the release workflow feeds it a CLEAN semver
# via $GORELEASER_CURRENT_TAG (=vX.Y.Z) plus $CLI_VERSION, and runs `release --clean --skip=validate
# --skip=publish` — which builds artifacts and GENERATES the Homebrew cask under dist/ but pushes
# nothing. The workflow then publishes the GitHub release itself on the real cli/vX.Y.Z tag with `gh`
# and pushes the generated cask to the tap (see the homebrew_casks note below). Every name/version
# template below uses {{ .Env.CLI_VERSION }} (e.g. 0.1.0); the cask url.template uses {{ .Version }}
# (the same clean semver, from the tag env).

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: knowledge-tools
    main: ./cmd/knowledge-tools
    binary: knowledge-tools
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      # Clean version in the binary, injected by the workflow (e.g. 0.1.0).
      - -X main.version={{ .Env.CLI_VERSION }}

# Snapshot mode builds real artifacts without a parseable git tag — used by local `make
# release-local`. CI no longer uses snapshot; it feeds a clean tag via $GORELEASER_CURRENT_TAG and
# runs --skip=publish instead. Kept so local builds still work.
snapshot:
  version_template: "{{ .Env.CLI_VERSION }}"

archives:
  - id: knowledge-tools
    name_template: "{{ .ProjectName }}_{{ .Env.CLI_VERSION }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^build\(deps\):'
      - Merge pull request
      - Merge branch

# Homebrew cask, published to josephschmitt/homebrew-tap on each release. Two things make this work
# despite the cli/ tag prefix:
#   1. goreleaser GENERATES this cask file under dist/homebrew/Casks/ even when run with
#      --skip=publish (which the workflow uses), but does NOT push it. The workflow pushes the
#      generated file to the tap itself, AFTER the gh release + assets exist — so a failed release
#      never leaves a broken cask, and the cask's sha256s always match the uploaded archives (one
#      build). The `repository`/`token` below name the push target goreleaser bakes into the cask;
#      the workflow's own push targets the same repo. (release.disable, below, also keeps goreleaser
#      from creating the GitHub release — the `gh` step owns that on the real cli/vX.Y.Z tag.)
#   2. url.template overrides goreleaser's default download URL (releases/download/#{version}/...),
#      which would point at a clean vX.Y.Z tag (the *skill* namespace) instead of the real
#      cli/vX.Y.Z release. {{ .Version }} is the clean semver (from $GORELEASER_CURRENT_TAG=vX.Y.Z).
homebrew_casks:
  - name: knowledge-tools
    repository:
      owner: josephschmitt
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    url:
      template: "https://github.com/josephschmitt/knowledge-tools/releases/download/cli/v{{ .Version }}/{{ .ArtifactName }}"
    homepage: https://github.com/josephschmitt/knowledge-tools
    description: "Host-side CLI for the personal LLM-wiki vault (compile/synthesize/resolve + daemon)"
    hooks:
      post:
        install: |
          system_command "/bin/ln", args: ["-sf", "#{staged_path}/knowledge-tools", "#{HOMEBREW_PREFIX}/bin/kt"]
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/knowledge-tools"]

nfpms:
  - id: knowledge-tools
    package_name: knowledge-tools
    file_name_template: "{{ .ProjectName }}_{{ .Env.CLI_VERSION }}_{{ .Os }}_{{ .Arch }}"
    vendor: Joseph Schmitt
    homepage: https://github.com/josephschmitt/knowledge-tools
    maintainer: Joseph Schmitt <ai@joe.sh>
    description: Host-side CLI for the personal LLM-wiki vault
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/bin
    contents:
      # Short alias for daily use.
      - src: /usr/bin/knowledge-tools
        dst: /usr/bin/kt
        type: symlink

# goreleaser does NOT create the GitHub release — the workflow publishes it on the real cli/vX.Y.Z
# tag with `gh` (see cli-release.yml). `disable: true` belt-and-suspenders with the workflow's
# --skip=publish: it keeps any `goreleaser release` invocation from creating a release on the clean
# vX.Y.Z tag we feed it (which would collide with the skill namespace).
release:
  github:
    owner: josephschmitt
    name: knowledge-tools
  disable: "true"
