name: CLI Release

# Releases the Go CLI under a distinct cli/vX.Y.Z tag prefix so it never collides with the skill
# releases (which use a skills/vX.Y.Z prefix — see package-skills.yml). Two ways to cut a release:
#   - Auto: a cli/** change merged to main computes the next cli/vX.Y.Z from the landed
#     conventional-commit prefixes (see "Plan release").
#   - Manual: push a cli/v* tag (re-cuts, hotfixes).
# Either way the job runs `goreleaser release --skip=publish` (OSS goreleaser can't parse the cli/
# prefix as semver, so we feed it a clean vX.Y.Z via GORELEASER_CURRENT_TAG and skip git-state
# validation) to build artifacts and GENERATE the Homebrew cask without pushing anything, then
# publishes the GitHub release itself on the real cli/vX.Y.Z tag with `gh`, then pushes goreleaser's
# generated cask to josephschmitt/homebrew-tap — in that order, so the cask lands only after its
# release assets exist. Doing the build and the release in one run is required: a tag/release created
# by the workflow's GITHUB_TOKEN does NOT trigger other workflows, so we can't split this across a
# tag-push event (mirrors package-skills.yml).
on:
  push:
    branches: [main]
    tags:
      - 'cli/v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cli-release
  cancel-in-progress: false

jobs:
  goreleaser:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --force --tags

      # Decide whether (and at what version) to release. We gate on cli/** *here* rather than via a
      # trigger-level `paths:` filter, because `paths` interacts ambiguously with tag pushes and
      # could suppress the manual cli/v* escape hatch. The same conventional-commit scan also
      # implements the "skip docs/chore-only merges" rule. On a tag push we skip computation and
      # release that exact tag.
      - name: Plan release
        id: plan
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$REF_TYPE" = "tag" ]; then
            echo "Manual release for tag $REF_NAME"
            echo "mode=manual"             >> "$GITHUB_OUTPUT"
            echo "release=1"               >> "$GITHUB_OUTPUT"
            echo "tag=$REF_NAME"           >> "$GITHUB_OUTPUT"
            echo "version=${REF_NAME#cli/v}" >> "$GITHUB_OUTPUT"   # cli/v1.2.3 -> 1.2.3
            exit 0
          fi

          echo "mode=auto" >> "$GITHUB_OUTPUT"

          latest="$(git tag -l 'cli/v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            msgs="$(git log --format='%s%n%b' -- cli/)"          # first release: all history
          else
            msgs="$(git log "${latest}..HEAD" --format='%s%n%b' -- cli/)"
          fi

          # Pick the bump from the conventional-commit prefixes of the cli/-touching commits.
          brk=0; feat=0; fix=0
          printf '%s\n' "$msgs" | grep -qiE '^[a-z]+(\([^)]+\))?!:' && brk=1
          printf '%s\n' "$msgs" | grep -q  'BREAKING CHANGE'        && brk=1
          printf '%s\n' "$msgs" | grep -qiE '^feat(\([^)]+\))?:'    && feat=1
          printf '%s\n' "$msgs" | grep -qiE '^fix(\([^)]+\))?:'     && fix=1

          if [ "$brk$feat$fix" = "000" ]; then
            echo "No releasable cli/ commits since ${latest:-repo start}; skipping."
            echo "release=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$latest" ]; then
            next="cli/v0.1.0"                                     # first release pin
          else
            IFS=. read -r MA MI PA <<<"${latest#cli/v}"
            if   [ "$brk" = 1 ] && [ "$MA" -ge 1 ]; then
              next="cli/v$((MA+1)).0.0"                           # post-1.0 breaking -> major
            elif [ "$brk" = 1 ] || [ "$feat" = 1 ]; then
              next="cli/v${MA}.$((MI+1)).0"                       # pre-1.0 breaking, or feat -> minor
            else
              next="cli/v${MA}.${MI}.$((PA+1))"                   # fix only -> patch
            fi
          fi
          echo "release=1" >> "$GITHUB_OUTPUT"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "version=${next#cli/v}" >> "$GITHUB_OUTPUT"   # cli/v1.2.3 -> 1.2.3
          echo "Next CLI tag: $next"

      - name: Read Go version from devbox.json
        id: go-version
        if: steps.plan.outputs.release == '1'
        run: |
          version=$(jq -r '.packages[] | select(startswith("go@")) | split("@")[1]' cli/devbox.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        if: steps.plan.outputs.release == '1'
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache-dependency-path: cli/go.sum

      # Build artifacts and GENERATE (don't push) the Homebrew cask. OSS goreleaser can't parse the
      # cli/ prefix as semver, so we feed it a clean vX.Y.Z via GORELEASER_CURRENT_TAG (and inject the
      # same clean version via CLI_VERSION) and skip git-state validation — in the auto path HEAD
      # isn't tagged yet (the gh step creates cli/vX.Y.Z afterward), so `validate` would object.
      # `--skip=publish` keeps goreleaser from pushing anything (no GitHub release — also disabled in
      # .goreleaser.yaml — and no tap push) while STILL writing the cask to
      # cli/dist/homebrew/Casks/knowledge-tools.rb. A later step pushes that exact file to the tap,
      # but only after the gh release + assets exist, so a failed release never leaves a broken cask;
      # because it's the same single build, the cask's sha256s are guaranteed to match the uploaded
      # archives. Artifacts land in cli/dist/.
      - name: Build artifacts + generate Homebrew cask (GoReleaser)
        if: steps.plan.outputs.release == '1'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          workdir: cli
          args: release --clean --skip=validate --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_VERSION: ${{ steps.plan.outputs.version }}
          GORELEASER_CURRENT_TAG: v${{ steps.plan.outputs.version }}

      # Publish the GitHub release ourselves on the real cli/vX.Y.Z tag. We create the tag as an
      # *annotated* tag (the auto path) to match the old behavior — `cli/Makefile` derives its local
      # build version via `git describe --tags`, so we don't want a lightweight API-created tag. A
      # GITHUB_TOKEN-pushed tag does NOT re-trigger this workflow, so no loop.
      - name: Publish GitHub release
        if: steps.plan.outputs.release == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.plan.outputs.tag }}
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd cli
          files=(dist/*.tar.gz dist/*.zip dist/*.deb dist/*.rpm dist/*.apk dist/*.pkg.tar.zst dist/checksums.txt)
          if [ "${#files[@]}" -eq 0 ]; then echo "No artifacts found in cli/dist/" >&2; exit 1; fi
          printf 'uploading: %s\n' "${files[@]}"

          # Auto path: the tag doesn't exist yet, so create it annotated at HEAD (the merge commit).
          # Manual path: the human already pushed the tag, so leave it as-is.
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "$TAG"
            git push origin "$TAG"
          fi

          # Create the release, or — if re-running on an existing release — refresh its title + notes
          # and replace the assets so a re-cut never leaves stale metadata behind.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "knowledge-tools CLI v${VERSION}" --generate-notes
            gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "knowledge-tools CLI v${VERSION}" \
              --generate-notes
          fi

      # Publish the Homebrew cask to josephschmitt/homebrew-tap. We push goreleaser's generated cask
      # file (cli/dist/homebrew/Casks/knowledge-tools.rb) ourselves rather than letting goreleaser
      # push it, so it lands ONLY after the release above succeeded — its url.template points at the
      # cli/vX.Y.Z release assets, which now exist, and its sha256s match them (same single build).
      # Idempotent: a re-cut with an unchanged cask is a clean no-op.
      - name: Publish Homebrew cask
        if: steps.plan.outputs.release == '1'
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail
          cask="cli/dist/homebrew/Casks/knowledge-tools.rb"
          if [ ! -f "$cask" ]; then echo "Cask not generated at $cask" >&2; exit 1; fi

          tap="$(mktemp -d)"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/josephschmitt/homebrew-tap.git" "$tap"
          mkdir -p "$tap/Casks"
          cp "$cask" "$tap/Casks/knowledge-tools.rb"

          cd "$tap"
          git add Casks/knowledge-tools.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date; nothing to push."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "knowledge-tools cli v${VERSION}"
          git push
