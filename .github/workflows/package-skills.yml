name: Release skills

# Skills release under a skills/vX.Y.Z tag prefix (the CLI uses cli/vX.Y.Z — see cli-release.yml);
# the prefixes keep the two namespaces isolated. Two ways to ship skills:
#   - Auto: a skill change merged to main cuts a new release (version bumped from the
#     landed commits — see "Compute next version") with the per-skill zips attached.
#   - Manual: publish a GitHub release by hand (tagged skills/v*) and this packages it (the
#     upload path).
#
# The auto path builds the zips AND creates the release in one run on purpose: a release
# created by the workflow's GITHUB_TOKEN does NOT trigger other workflows, so we can't
# rely on the `release: published` event to package an auto-cut release.

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    # Only handle skills releases. A `release: published` event for a non-skills tag (e.g. a
    # hand-published cli/v* release) must not build/attach skill zips to it; the auto path
    # (push to main / workflow_dispatch) always proceeds.
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'skills/v')
    steps:
      - uses: actions/checkout@v4
        with:
          # Manual release: build from the tagged commit. Otherwise the pushed commit.
          # Full history + tags so we can compute the next version from existing tags.
          ref: ${{ github.event.release.tag_name || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skills before packaging
        run: python3 scripts/validate_skills.py

      - name: Compute next version
        id: ver
        if: github.event_name != 'release'
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          latest="$(git tag -l 'skills/v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            # One-time transition: continue the lineage from the last plain v* tag (pre-prefix).
            base="$(git tag -l 'v*.*.*' --sort=-v:refname | head -n1)"   # e.g. v2.0.0, else empty
          else
            base="${latest#skills/}"   # skills/v2.1.0 -> v2.1.0
          fi
          if [ -z "$base" ]; then
            next="skills/v0.1.0"   # very first release in this repo
          else
            IFS=. read -r MA MI PA <<<"${base#v}"

            # Messages of the commits that just landed, to pick the semver bump. On a
            # first push / force-push BEFORE is all-zeros, so fall back to the tip commit.
            if git rev-parse --quiet --verify "${BEFORE}^{commit}" >/dev/null 2>&1; then
              msgs="$(git log --format='%s%n%b' "${BEFORE}..${AFTER}")"
            else
              msgs="$(git log -n1 --format='%s%n%b' "${AFTER}")"
            fi

            # Default minor; conventional-commit prefixes in the landed commits override.
            if printf '%s\n' "$msgs" | grep -qiE '^[a-z]+(\([^)]+\))?!:' \
               || printf '%s\n' "$msgs" | grep -q 'BREAKING CHANGE'; then
              next="skills/v$((MA+1)).0.0"
            elif printf '%s\n' "$msgs" | grep -qiE '^fix(\([^)]+\))?:' \
                 && ! printf '%s\n' "$msgs" | grep -qiE '^feat(\([^)]+\))?:'; then
              next="skills/v${MA}.${MI}.$((PA+1))"
            else
              next="skills/v${MA}.$((MI+1)).0"
            fi
          fi
          echo "next=$next" >>"$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Build per-skill zips
        run: |
          set -euo pipefail
          mkdir -p dist
          # Zip each skill as `<name>/...` at the root of the archive, which is the
          # layout claude.ai expects for skill uploads. Skill folders live at
          # plugins/<plugin>/skills/<name>/.
          for skill_md in plugins/*/skills/*/SKILL.md; do
            skill_dir="$(dirname "$skill_md")"
            name="$(basename "$skill_dir")"
            (cd "$(dirname "$skill_dir")" && zip -r "$GITHUB_WORKSPACE/dist/${name}.zip" "$name" -x '*.DS_Store' '*/.DS_Store')
            echo "built dist/${name}.zip"
          done
          ls -la dist/

      - name: Create release with zips (auto)
        if: github.event_name != 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          gh release create "$TAG" dist/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes

      - name: Upload zips to release (manual)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # --clobber so re-running replaces assets instead of failing.
          gh release upload "$TAG" dist/*.zip --repo "$GITHUB_REPOSITORY" --clobber
