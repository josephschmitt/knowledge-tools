name: Build & push knowledge-service image

# Builds the knowledge-service image (MCP /mcp + REST /api/v1) and pushes it to GHCR so the
# homelab pulls a published image instead of building from a source checkout on disk. The
# published package is public (set once in the package settings after the first push) even
# though this repo is private — the image holds only server code, no vault content or secrets.

on:
  push:
    branches: [main]
    paths:
      - 'service/**'
      - '.github/workflows/build-service.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/josephschmitt/knowledge-service

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3 # emulation for the arm64 build

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
